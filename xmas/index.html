<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
  
  <!-- -->
  
  
  <section id="hero" style="background:#333;">
    <div class="hero-container">
      <h1>XMAS Countdown 2020</h1>
      <h2>I hope that everyone will enjoy this remaining time left for XMAS 2020</h2>
      <div class="countdown" data-count="2020/12/3" data-template="%w weeks %d days <br> %H:%M:%S">
        <div id="days"></div> 
        <br>
       <div id="hours"></div>:
    <div id="minutes"></div>:
    <div id="seconds"></div>
      </div>

      <form action="forms/notify.php" method="post" role="form" class="php-email-form">
        <div class="row no-gutters">
          <div class="col-md-6 form-group pr-md-1">
            <input type="text" name="name" class="form-control" id="name" placeholder="Your Name" data-rule="minlen:4" data-msg="Please enter at least 4 chars">
            <div class="validate"></div>
          </div>
          <div class="col-md-6 form-group pl-md-1">
            <input type="email" class="form-control" name="email" id="email" placeholder="Your Email" data-rule="email" data-msg="Please enter a valid email">

        <div class="mb-1">

  <!-- -->
  <div id="countdown" class="d-none">
    <h1>Countdown until Christmas Day.</h1>
    <div id="days"></div>
    <div id="hours"></div>
    <div id="minutes"></div>
    <div id="seconds"></div>
</div>

<script>
function calculateChristmasCountdown(){
    

    var now = new Date();
 
    //Get the current month. Add a +1 because
    //getMonth starts at 0 for January.
    var currentMonth = (now.getMonth() + 1);
 
    //Get the current day of the month.
    var currentDay = now.getDate();
 
    //Work out the year that the next Christmas
    //day will occur on.
    var nextChristmasYear = now.getFullYear();
    if(currentMonth == 12 && currentDay > 25){
        //This year's Christmas Day has already passed.
        nextChristmasYear = nextChristmasYear + 1;
    }
 
    var nextChristmasDate = nextChristmasYear + '-12-25T00:00:00.000Z';
    var christmasDay = new Date(nextChristmasDate);
 
    //Get the difference in seconds between the two days.
    var diffSeconds = Math.floor((christmasDay.getTime() - now.getTime()) / 1000);
 
    var days = 0;
    var hours = 0;
    var minutes = 0;
    var seconds = 0;
 
    //Don't calculate the time left if it is Christmas day.
    if(currentMonth != 12 || (currentMonth == 12 && currentDay != 25)){
        //Convert these seconds into days, hours, minutes, seconds.
        days = Math.floor(diffSeconds / (3600*24));
        diffSeconds  -= days * 3600 * 24;
        hours   = Math.floor(diffSeconds / 3600);
        diffSeconds  -= hours * 3600;
        minutes = Math.floor(diffSeconds / 60);
        diffSeconds  -= minutes * 60;
        seconds = diffSeconds;
    }
 
    //Add our counts to their corresponding HTML elements.
    document.getElementById('days').innerHTML = days ;
    document.getElementById('hours').innerHTML = hours;
    document.getElementById('minutes').innerHTML = minutes;
    document.getElementById('seconds').innerHTML = seconds;
 
    //Recursive call after 1 second using setTimeout
    setTimeout(calculateChristmasCountdown, 1000);
}
 
calculateChristmasCountdown();
</script>

</body>
</html>
